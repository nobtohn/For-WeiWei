<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>For You 💙</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue1: #a8cff0; --blue2: #7ab8e8; --blue3: #4a85b5;
    --text: #3a6080; --textsoft: #8ab0c8;
    --heart: #f4a7b9; --white: #ffffff;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family: 'Quicksand', sans-serif;
    min-height: 100dvh;
    background: #d6ecfc;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse at 15% 15%, #c0dcf5 0%, transparent 50%),
      radial-gradient(ellipse at 85% 85%, #b5d5f2 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, #d6ecfc 0%, transparent 65%);
    z-index:0;
  }
  .bg-hearts { position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
  .bg-heart { position:absolute; animation:floatUp linear infinite; opacity:0; }
  @keyframes floatUp {
    0%   { transform:translateY(110vh); opacity:0; }
    10%  { opacity:0.45; }
    90%  { opacity:0.25; }
    100% { transform:translateY(-10vh); opacity:0; }
  }
  .container {
    position:relative; z-index:2;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:1.8rem; padding:2rem 1.2rem;
    width:100%; max-width:480px; text-align:center;
  }
  .header { animation:fadeDown 0.8s ease both; }
  .header h1 {
    font-family:'Playfair Display', serif;
    font-size:clamp(1.6rem,5vw,2.2rem);
    color:var(--blue3); letter-spacing:0.02em; line-height:1.2;
  }
  .header p { font-size:0.9rem; color:var(--textsoft); margin-top:0.4rem; font-weight:500; }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-18px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(18px)}  to{opacity:1;transform:translateY(0)} }

  /* Button */
  .btn-wrap { position:relative; display:flex; align-items:center; justify-content:center; animation:fadeUp 0.8s 0.2s ease both; }
  .pulse-ring {
    position:absolute; width:170px; height:170px; border-radius:50%;
    border:2px solid rgba(122,184,232,0.5); opacity:0;
    animation:pulseRing 2.2s ease-out infinite;
    pointer-events:none;
  }
  .pulse-ring:nth-child(2){animation-delay:0.75s}
  .pulse-ring:nth-child(3){animation-delay:1.5s}
  @keyframes pulseRing { 0%{transform:scale(0.85);opacity:0.6} 100%{transform:scale(1.9);opacity:0} }

  .orbit { position:absolute; inset:-35px; border-radius:50%; animation:spin 7s linear infinite; pointer-events:none; }
  .orbit span { position:absolute; animation:counterSpin 7s linear infinite; font-size:1.1rem; }
  @keyframes spin        { to{transform:rotate(360deg)} }
  @keyframes counterSpin { to{transform:rotate(-360deg)} }

  .love-btn {
    position:relative; z-index:5;
    width:155px; height:155px; border-radius:50%; border:none;
    background:linear-gradient(145deg,#b8d9f5,#7ab0e0);
    box-shadow:0 8px 30px rgba(90,150,210,0.45),inset 0 2px 0 rgba(255,255,255,0.55);
    cursor:pointer; color:white;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0.25rem;
    transition:transform 0.15s, box-shadow 0.15s; user-select:none;
  }
  .love-btn:hover { transform:scale(1.07); box-shadow:0 14px 40px rgba(90,150,210,0.5),inset 0 2px 0 rgba(255,255,255,0.55); }
  .love-btn:active { transform:scale(0.95); }
  .btn-icon { font-size:2rem; display:block; }
  .btn-label { font-family:'Playfair Display',serif; font-size:0.95rem; font-style:italic; line-height:1.3; }
  .btn-count { font-family:'Quicksand',sans-serif; font-size:0.65rem; font-weight:600; opacity:0.8; }

  /* Message card */
  .msg-card {
    width:100%; max-width:400px;
    background:rgba(255,255,255,0.72);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1.5px solid rgba(168,207,240,0.55);
    border-radius:1.8rem; padding:1.8rem 2rem;
    box-shadow:0 8px 30px rgba(100,160,220,0.13);
    min-height:100px; display:flex; align-items:center; justify-content:center;
    animation:fadeUp 0.8s 0.35s ease both; position:relative; overflow:hidden;
  }
  .msg-card::before {
    content:'\201C'; position:absolute; top:-14px; left:14px;
    font-family:'Playfair Display',serif; font-size:5.5rem;
    color:var(--blue1); opacity:0.25; line-height:1;
  }
  .msg-text {
    font-family:'Playfair Display',serif;
    font-size:clamp(1rem,3.5vw,1.15rem);
    color:var(--text); line-height:1.65; font-style:italic;
    position:relative; z-index:1;
    opacity:0; transform:translateY(8px);
    transition:opacity 0.45s ease, transform 0.45s ease;
  }
  .msg-text.visible { opacity:1; transform:translateY(0); }
  .msg-text.final {
    font-family:'Quicksand',sans-serif; font-style:normal; font-size:clamp(0.85rem,3vw,0.98rem);
    font-weight:500; line-height:1.75; color:var(--blue3);
  }
  .placeholder { font-family:'Quicksand',sans-serif; font-size:0.88rem; color:var(--textsoft); font-weight:500; }

  /* Dots */
  .dots { display:flex; gap:0.45rem; flex-wrap:wrap; justify-content:center; max-width:280px; animation:fadeUp 0.8s 0.5s ease both; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--blue1); transition:background 0.3s,transform 0.3s; }
  .dot.done { background:var(--blue3); transform:scale(1.15); }
  .dot.active { background:var(--heart); transform:scale(1.35); }

  /* Burst */
  .burst { position:fixed; pointer-events:none; z-index:999; animation:burstAnim 0.9s ease-out forwards; }
  @keyframes burstAnim {
    0%   { transform:translate(0,0) scale(0.4); opacity:1; }
    100% { transform:translate(var(--tx),var(--ty)) scale(1.1); opacity:0; }
  }

  .all-done {
    font-family:'Playfair Display',serif; font-size:0.9rem;
    color:var(--textsoft); font-style:italic;
    opacity:0; transition:opacity 0.8s; pointer-events:none;
  }
  .all-done.show { opacity:1; }
</style>
</head>
<body>
<div class="bg-hearts" id="bgHearts"></div>

<div class="container">
  <div class="header">
    <h1>For you, my Wei Wei 💙</h1>
    <p>press and find out...</p>
  </div>

  <div class="btn-wrap">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="orbit" id="orbit"></div>
    <button class="love-btn" id="loveBtn">
      <span class="btn-icon">💙</span>
      <span class="btn-label">why I<br>love you</span>
      
    </button>
  </div>

  <div class="msg-card">
    <div class="msg-text" id="msgText"><span class="placeholder">tap the button 💙</span></div>
  </div>

  <div class="dots" id="dots"></div>
  <div class="all-done" id="allDone">~ that's everything, and yet not enough ~</div>
</div>

<script>
const messages = [
  "I love your smile",
  "I love your voice",
  "I love how your humour matches mine",
  "I love your laugh",
  "I love how you always want to be next to me",
  "I love how you always be yourself",
  "I love your personality",
  "I love how you always light up my world",
  "I love that you're always thoughtful about me",
  "I love how you show me what love is",
  "I love how you manage to make me feel like I want to become a better person",
  "I love how you manage to make everything so meaningful",
  "I love how you make every moment feel meaningful",
  "I love how you're willing to change for me",
  "I love how you just want to be with me",
  "I love how you're making me the happiest person",
  "I love how you can make me smile every time",
  "I love how you react when you're shy",
  "I love how you hug me",
  "I love to hold your cold cold hands until they're sweaty",
  "I love to hug you",
  "I love to hold you and sleep next to you",
  "I love that you're my safe space",
  "You love me in the times I'm hard to love",
  "I love how you can show your vulnerable side to me",
  "I love your eyes",
  "I love every part of your appearance",
  "I love how you try to know me better",
  "I love how you know how to calm me down",
  "I love how you teach me how to love unconditionally",
  "I love how you have a good heart",
  "I love everything about you, my love. Every detail about you that makes who you are — I love every part of you. Your flaws, your insecurity, your sadness, your happiness, your excitement, your impatience, your interests. I really love everything about you, baby. I really love you. 💙"
];

let current = 0;

// dots
const dotsEl = document.getElementById('dots');
messages.forEach((_,i) => {
  const d = document.createElement('div');
  d.className = 'dot'; d.id = 'dot'+i;
  dotsEl.appendChild(d);
});

// orbit hearts
const orbitEl = document.getElementById('orbit');
const orbitEmojis = ['💙','🩵','🤍','💙','🩵','🤍'];
orbitEmojis.forEach((e,i) => {
  const s = document.createElement('span');
  s.textContent = e;
  const angle = (i / orbitEmojis.length) * Math.PI * 2;
  s.style.left = (50 + Math.cos(angle) * 50) + '%';
  s.style.top  = (50 + Math.sin(angle) * 50) + '%';
  s.style.transform = 'translate(-50%,-50%)';
  orbitEl.appendChild(s);
});

// bg hearts
const bgEl = document.getElementById('bgHearts');
const bgEmojis = ['💙','🩵','🤍','💙','🩵'];
for (let i=0;i<14;i++) {
  const h = document.createElement('div');
  h.className = 'bg-heart';
  h.textContent = bgEmojis[i % bgEmojis.length];
  h.style.left = Math.random()*100+'vw';
  h.style.fontSize = (0.8+Math.random()*1)+'rem';
  h.style.animationDuration = (9+Math.random()*10)+'s';
  h.style.animationDelay = (Math.random()*12)+'s';
  bgEl.appendChild(h);
}

function spawnBursts(x,y) {
  const emojis = ['💙','🩵','🤍','✨','💫','🩷'];
  for (let i=0;i<8;i++) {
    const el = document.createElement('div');
    el.className = 'burst';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const angle = (i/8)*Math.PI*2;
    const dist = 55+Math.random()*55;
    el.style.left = x+'px'; el.style.top = y+'px';
    el.style.setProperty('--tx', Math.cos(angle)*dist+'px');
    el.style.setProperty('--ty', Math.sin(angle)*dist+'px');
    el.style.fontSize = (1+Math.random()*0.6)+'rem';
    el.style.animationDelay = (Math.random()*0.08)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
  }
}

document.getElementById('loveBtn').addEventListener('click', function(e) {
  if (current >= messages.length) return;
  const rect = this.getBoundingClientRect();
  spawnBursts(rect.left+rect.width/2, rect.top+rect.height/2);

  const msgText = document.getElementById('msgText');
  msgText.classList.remove('visible','final');

  setTimeout(()=>{
    const msg = messages[current];
    const isFinal = current === messages.length-1;
    msgText.textContent = msg;
    if (isFinal) msgText.classList.add('final');
    setTimeout(()=>msgText.classList.add('visible'),30);

    // update dots
    const prev = document.getElementById('dot'+(current-1));
    if (prev) { prev.classList.remove('active'); prev.classList.add('done'); }
    const dot = document.getElementById('dot'+current);
    if (dot) dot.classList.add('active');

    current++;
    

    if (current >= messages.length) {
      setTimeout(()=>{
        document.getElementById('dot'+(current-1)).classList.remove('active');
        document.getElementById('dot'+(current-1)).classList.add('done');
        const btn = document.getElementById('loveBtn');
        btn.style.opacity='0.5'; btn.style.pointerEvents='none';
        document.getElementById('allDone').classList.add('show');
      },600);
    }
  },280);
});
</script>
</body>
</html>
